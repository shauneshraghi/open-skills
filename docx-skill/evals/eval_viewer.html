<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>docx-creation-editing — Eval Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
  .summary { display: flex; gap: 1rem; margin-bottom: 2rem; }
  .stat-box { background: white; border-radius: 8px; padding: 1rem 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); text-align: center; min-width: 100px; }
  .stat-box .value { font-size: 2rem; font-weight: 700; }
  .stat-box .label { font-size: 0.8rem; color: #666; margin-top: 0.25rem; }
  .pass .value { color: #16a34a; }
  .fail .value { color: #dc2626; }
  .total .value { color: #1d4ed8; }
  .eval-card { background: white; border-radius: 8px; margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: hidden; }
  .eval-header { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; cursor: pointer; }
  .eval-header:hover { background: #fafafa; }
  .badge { display: inline-block; border-radius: 4px; padding: 0.2rem 0.6rem; font-size: 0.75rem; font-weight: 600; }
  .badge-pass { background: #dcfce7; color: #16a34a; }
  .badge-fail { background: #fee2e2; color: #dc2626; }
  .eval-id { font-family: monospace; font-size: 0.85rem; color: #666; }
  .eval-name { font-weight: 600; flex: 1; }
  .eval-body { padding: 0 1.25rem 1.25rem; border-top: 1px solid #eee; display: none; }
  .eval-body.open { display: block; }
  .field { margin-top: 0.75rem; }
  .field-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.25rem; }
  pre { background: #f8f8f8; border: 1px solid #e5e5e5; border-radius: 4px; padding: 0.75rem; font-size: 0.82rem; overflow-x: auto; white-space: pre-wrap; }
  .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .tag { background: #eff6ff; color: #1d4ed8; border-radius: 4px; padding: 0.15rem 0.5rem; font-size: 0.75rem; }
  .assertions li { font-size: 0.85rem; margin-left: 1.2rem; margin-top: 0.25rem; font-family: monospace; }
</style>
</head>
<body>

<h1>docx-creation-editing — Eval Results</h1>
<p class="subtitle">Skill v0.1.0 · Built from python-docx 1.2.0 + ECMA-376 · Apache POI test fixtures</p>

<div class="summary">
  <div class="stat-box total"><div class="value" id="total">5</div><div class="label">Total</div></div>
  <div class="stat-box pass"><div class="value" id="pass-count">5</div><div class="label">Passed</div></div>
  <div class="stat-box fail"><div class="value" id="fail-count">0</div><div class="label">Failed</div></div>
</div>

<div id="evals"></div>

<script>
const evals = [
  {
    id: "eval_01",
    name: "Create docx with inline image and alt text",
    passed: true,
    tags: ["images", "creation", "alt-text"],
    description: "Create a new document, embed a PNG as an inline image, set alt text, save, and validate that the image appears in the package and the alt text is present in wp:docPr/@descr.",
    prompt: "Create a new .docx file at /tmp/eval01.docx. Add a heading 'Image Test', add a paragraph 'See image below:', then add an inline image from /tmp/eval01_image.png with alt text 'A red square test image'. Save the document. Then validate it and confirm: (1) the file is valid, (2) stats.images == 1, (3) the string 'A red square test image' appears in the raw XML of word/document.xml.",
    assertions: [
      "validate('/tmp/eval01.docx')['valid'] == True",
      "validate('/tmp/eval01.docx')['stats']['images'] == 1",
      "'A red square test image' in zipfile.ZipFile('/tmp/eval01.docx').read('word/document.xml').decode()"
    ],
    result: {
      stats: { paragraphs: 3, images: 1, comments: 0, tracked_insertions: 0, tracked_deletions: 0 },
      alt_in_xml: true
    },
    fixture: null
  },
  {
    id: "eval_02",
    name: "Insert a comment on a specific paragraph",
    passed: true,
    tags: ["comments", "insert"],
    description: "Open a freshly created document, insert a comment on paragraph 1 with specific author and text, save, and verify the comment appears with correct metadata.",
    prompt: "Create a .docx at /tmp/eval02_base.docx with two paragraphs. Open it, add a comment to paragraph index 1 with text='Review this section' and author='Alice'. Save to /tmp/eval02.docx. Read back the comments and confirm: 1 comment, correct text and author.",
    assertions: [
      "len(read_comments(open_document('/tmp/eval02.docx'))) == 1",
      "read_comments(open_document('/tmp/eval02.docx'))[0]['author'] == 'Alice'",
      "read_comments(open_document('/tmp/eval02.docx'))[0]['text'] == 'Review this section'"
    ],
    result: {
      comments: [{ id: 0, author: "Alice", initials: "", timestamp: "2026-05-18T11:05:14+00:00", text: "Review this section" }]
    },
    fixture: null
  },
  {
    id: "eval_03",
    name: "Read comments from Apache POI test fixture",
    passed: true,
    tags: ["comments", "read", "poi-fixture"],
    description: "Open the Apache POI comment.docx test fixture and read all comments. Verify at least one comment is present and has non-empty author and text fields.",
    prompt: "Open /home/user/poi/test-data/document/comment.docx using open_document(). Call read_comments() and confirm: ≥1 comment, all with non-empty author and text.",
    assertions: [
      "len(read_comments(...)) >= 1",
      "all(c['author'] for c in read_comments(...))",
      "all(c['text'] for c in read_comments(...))"
    ],
    result: {
      comment_count: 1,
      comments: [{ id: 0, author: "Unbekannter Autor", initials: "", timestamp: "2019-10-11T05:43:39+00:00", text: "This is the first line\n\nThis is the second line" }]
    },
    fixture: "/home/user/poi/test-data/document/comment.docx"
  },
  {
    id: "eval_04",
    name: "Insert tracked deletion and accept all changes",
    passed: true,
    tags: ["track-changes", "accept", "deletion"],
    description: "Create a document with a paragraph, insert a tracked deletion (w:del), verify the element is present, then accept all changes and verify it is gone.",
    prompt: "Create a .docx with paragraph 'Hello world this is a test'. Insert tracked deletion of 'this is a test' by Bob. Save. Verify w:del present. Open, accept all changes, save. Verify w:del and w:ins absent, document valid.",
    assertions: [
      "b'w:del' in zipfile.ZipFile('/tmp/eval04_deleted.docx').read('word/document.xml')",
      "b'w:del' not in zipfile.ZipFile('/tmp/eval04_accepted.docx').read('word/document.xml')",
      "b'w:ins' not in zipfile.ZipFile('/tmp/eval04_accepted.docx').read('word/document.xml')",
      "validate('/tmp/eval04_accepted.docx')['valid'] == True"
    ],
    result: {
      had_w_del: true,
      no_w_del_after_accept: true,
      changes_accepted: 1
    },
    fixture: null
  },
  {
    id: "eval_05",
    name: "Round-trip edit: open POI fixture, add image, validate",
    passed: true,
    tags: ["images", "round-trip", "poi-fixture"],
    description: "Open Apache POI VariousPictures.docx (5 images), add an inline image with alt text, save to new file. Validate: valid, image count +1, alt text in XML.",
    prompt: "Open /home/user/poi/test-data/document/VariousPictures.docx. Add an inline image with alt text 'Round-trip test image'. Save to /tmp/eval05.docx. Validate: valid, images increased, alt text in XML.",
    assertions: [
      "validate('/tmp/eval05.docx')['valid'] == True",
      "validate('/tmp/eval05.docx')['stats']['images'] > validate('/home/user/poi/test-data/document/VariousPictures.docx')['stats']['images']",
      "'Round-trip test image' in zipfile.ZipFile('/tmp/eval05.docx').read('word/document.xml').decode()"
    ],
    result: {
      initial_images: 5,
      final_images: 6
    },
    fixture: "/home/user/poi/test-data/document/VariousPictures.docx"
  }
];

const container = document.getElementById('evals');
evals.forEach((ev, i) => {
  const card = document.createElement('div');
  card.className = 'eval-card';
  const badgeClass = ev.passed ? 'badge-pass' : 'badge-fail';
  const badgeText = ev.passed ? 'PASS' : 'FAIL';
  const tags = ev.tags.map(t => `<span class="tag">${t}</span>`).join('');
  const assertionList = ev.assertions.map(a => `<li>${a}</li>`).join('');
  const fixtureHtml = ev.fixture ? `<div class="field"><div class="field-label">POI Fixture</div><code>${ev.fixture}</code></div>` : '';
  card.innerHTML = `
    <div class="eval-header" onclick="toggle(${i})">
      <span class="badge ${badgeClass}">${badgeText}</span>
      <span class="eval-id">${ev.id}</span>
      <span class="eval-name">${ev.name}</span>
    </div>
    <div class="eval-body" id="body-${i}">
      <div class="field"><div class="field-label">Description</div><p style="font-size:.9rem;margin-top:.25rem">${ev.description}</p></div>
      <div class="field"><div class="field-label">Tags</div><div class="tags">${tags}</div></div>
      ${fixtureHtml}
      <div class="field"><div class="field-label">Assertions</div><ul class="assertions">${assertionList}</ul></div>
      <div class="field"><div class="field-label">Result</div><pre>${JSON.stringify(ev.result, null, 2)}</pre></div>
      <div class="field"><div class="field-label">Prompt</div><pre>${ev.prompt}</pre></div>
    </div>
  `;
  container.appendChild(card);
});

function toggle(i) {
  const body = document.getElementById('body-' + i);
  body.classList.toggle('open');
}

// Auto-expand all
document.querySelectorAll('.eval-body').forEach(b => b.classList.add('open'));

const passCount = evals.filter(e => e.passed).length;
const failCount = evals.length - passCount;
document.getElementById('pass-count').textContent = passCount;
document.getElementById('fail-count').textContent = failCount;
document.getElementById('total').textContent = evals.length;
</script>
</body>
</html>
